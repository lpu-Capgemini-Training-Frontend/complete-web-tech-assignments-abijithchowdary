<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lists</title>
</head>
<body> 
    <h4>Unordered List with Default Type</h4>
    <ul>
        <li>Shoes</li>
        <li>Shirts</li>
        <li>Pants</li>
        <li>Watch</li>
    </ul>

    <h4>Unordered List with Sqaure Type</h4>
    <ul type="sqaure">
        <li>Shoes</li>
        <li>Shirts</li>
        <li>Pants</li>
        <li>Watch</li>
    </ul>

    <h4>Unordered List with Circular Type</h4>
    <ul type="circle">
        <li>Shoes</li>
        <li>Shirts</li>
        <li>Pants</li>
        <li>Watch</li>
    </ul>

    <h4>Unordered List with None Type</h4>
    <ul type="none">
        <li>Shoes</li>
        <li>Shirts</li>
        <li>Pants</li>
        <li>Watch</li>
    </ul>
    
</body>
</html>
