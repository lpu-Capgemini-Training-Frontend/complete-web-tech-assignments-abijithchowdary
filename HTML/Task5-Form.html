<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUpForm</title>
</head>
<body>
    <form>
        <fieldset style="width: 90%;" >
            <legend><strong>Sign Up Here</strong></legend>
            <table align="center" cellspacing="10" cellpadding="10">
                <tr>
                    <td>
                        <label for="fname">Name:</label><br>
                        <input type="text" placeholder="abc" id="fname" name="firstName">
                        
                    </td>
                    <td>
                        <label for="lname"></label><br>
                        <input type="text" placeholder="xyz" id="lname" name="LastName">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Email">Email:</label><br>
                        <input type="email" placeholder="abc@gmail.com" id="Email" name="email">
                    </td>
                    <td>
                        <label for="Phone">Contact:</label><br>
                        <input type="tel" placeholder="123-456-7890" id="Phone" name="phone">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Password">Set Password:</label><br>
                        <input type="password" placeholder="Gs@67ert" id="Password" name="password">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="profile">Profile:</label><br>
                        <input type="file" id="profile" name="profile">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="submit" value="Submit">
                    </td>
                </tr>
                
            </table>

        </fieldset>
    </form>
</body>
</html>
