<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>
<body>
    <form>
        <fieldset style="width: 95%;">
            <legend><strong>Application Details</strong></legend>
            <label for ="firstname">First Name:</label>
            <input type="text" id="firstname" name="fname" value=""><br>
            <br>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lname" value=""><br>
            <br>
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="email" value=""><br>
            <br>
    
            <label for="gender">Gender:</label><br>
            <br>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <br>
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female"><br>
            <br>
            <label for="phone">Contact:</label>
            <input type="tel" id="phone" name="phoneno"><br>
            <br>
            <label for="Qualification">Qualification:</label>
            <input type=file id="Qualification" name="qualification"><br>
            <br>
            <label for="joinDate">Joining Date:</label>
            <input type="date" id="joinDate" name="joinDate"><br>
            <br>
            <label for="Skills">Skills:</label>
            <input type="checkbox" id="Javascript" name="skills" value="Javascript">
            <label for="Javascript">JavaScript</label>
            <input type="checkbox" id="Java" name="skills" value="Java">
            <label for="Java">Java</label><br>
            <br>
            <input type="checkbox" id="React" name="skills" value="React">
            <label for="React">React</label>
            <input type="checkbox" id="Express" name="skills" value="Express">
            <label for="Express">Express</label><br>
            <br>
            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label>
            <input type="checkbox" id="sql" name="skills" value="SQL">
            <label for ="sql">SQL</label><br>
            <br>
            <label for="experience">Years of Experience:</label>
            <input type="range" id="experience" name="experience" min="0" max="25" value=""><br>
            <br>
            <label for="location">Work Location:</label>
            <select>
                <option value="default">default</option>
                <option value="hyd">Hyderabad</option>
                <option value="ban">Bangalore</option>
                <option value="che">Chennai</option>
                <option value="pune">Pune</option>
            </select>
            <br><br>
            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="50"></textarea><br>
            <br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </fieldset>
    </form>
</body>
</html>
