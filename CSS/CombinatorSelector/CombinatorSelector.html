<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombinatorSelectors</title>
    <link rel="stylesheet" href="./t6CombinatorSelector.css">
</head>
<body>
    <div id="wholeCon">
        <div id="Biryani">
            <h1>Ingredients for Biryani</h1>
            <ul type="disc">
                <li id="rice">Rice</li>
                <li id="chicken">Chicken
                    <ul id="chicken-ul" type="circle">
                        <li>Fried</li>
                        <li>Grilled</li>
                        <li>Roasted</li>
                    </ul>
                </li>
                <li id="paneer">Paneer</li>
            </ul>
        </div>
        <div id="FighterJet">
            <h1>Fighter Jet</h1>
            <ul>
                <li id="species">Spices</li>
                <li id="GasElectric">Gas/Electric</li>
            </ul>
        </div>
        <div id="Lassi">
            <h1>Ingredients for Lasssi</h1>
            <ul>
                <li id="curd">curd</li>
                <li id="water">Water</li>
                <li id="sugar">Sugar
                    <ul>
                        <li id="whitesugar">White Sugar</li>
                        <li id="brownsugar">Brown Sugar</li>
                    </ul>
                </li>
                <li id="malai">Malai</li>
                <li id="kova">Kova</li>
            </ul>
        </div>
    </div>

</body>
</html>
