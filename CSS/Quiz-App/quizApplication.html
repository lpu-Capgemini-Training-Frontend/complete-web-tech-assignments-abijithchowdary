<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="./quizApplication.css">
</head>
<body>
    <header id="header">Quiz Application</header>
    <main id="main">
        <section>
            <h4>1.why do come late to class?</h4>
            <input type="radio" name="one" id="op1"><label for="op1">A.traffic</label>
            <input type="radio" name="one" id="w1"><label for="w1">B.breakfast</label>
            <input type="radio" name="one" id="w11"><label for="w11">C.sleep</label>
            <input type="radio" name="one" id="w111"><label for="w111">D.others</label>
            <br>
            <p class="correct" id="op1an">correct</p>
            <p class="incorrect" id="w1an">incorrect</p>
            

            <h4>2.why do you ask so many questions?</h4>
            <input type="radio" name="two" id="w2"><label for="w2">A.improve you performance</label>
            <input type="radio" name="two" id="w22"><label for="w22">B.make you bored</label>
            <input type="radio" name="two" id="w222"><label for="w222">C.to disturb us</label>
            <input type="radio" name="two" id="op2"><label for="op2">D.to elimnate us</label>
            <br>
            <p class="correct" id="op2an">correct</p>
            <p class="incorrect" id="w2an">incorrect</p>
            

            <h4>3.who is prime minister of india?</h4>
            <input type="radio" name="three" id="op3"><label for="w3">A.narendra modi</label>
            <input type="radio" name="three" id="w33"><label for="w33">B.ashok mittal</label>
            <input type="radio" name="three" id="w333"><label for="w333">C.arvindh kejriwal</label>
            <input type="radio" name="three" id="w3"><label for="op3">D.me</label>
            <br>
            <p class="correct" id="op3an">correct</p>
            <p class="incorrect" id="w3an">incorrect</p>
        </section>
    </main>
    <footer id="footer"> this is footer</footer>
</body>
</html>
